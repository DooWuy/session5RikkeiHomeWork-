spring:
    application:
        name: api-gateway
    cloud:
        gateway:
            routes:
                - id: customer-service
                  uri: http://localhost:8081
                  predicates:
                      - Path=/api/customers/**
                  filters:
                      - RewritePath=/api/customers/$\{segment}

server:
    port: 8080
    servlet:
        context-path: /

logging:
    level:
        org.springframework.cloud.gateway: DEBUG
        org.springframework.web: DEBUG